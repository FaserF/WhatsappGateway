name: 💡 Feature Request
description: Propose a new feature or improvement for the WhatsApp Gateway backend
body:
  - type: markdown
    attributes:
      value: |
        Please describe your feature request clearly.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      placeholder: A clear and concise description of what the problem is (e.g., I'm frustrated when...)
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      placeholder: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      placeholder: Any other context, mockups, or screenshots here.
